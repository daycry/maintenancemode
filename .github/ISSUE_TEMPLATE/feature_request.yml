name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Tell us what you'd like to be able to do, and why.
        Smaller, focused requests get implemented faster.

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to do?
    validations:
      required: true

  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: How are you handling this today (if at all)?
    validations:
      required: false

  - type: textarea
    id: proposed-api
    attributes:
      label: Proposed API or behaviour
      description: |
        What would the ideal API look like? CLI flag? Config option?
        Pseudocode is fine.
      render: php
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Are you willing to contribute?
      options:
        - label: I'd like to open a PR for this
