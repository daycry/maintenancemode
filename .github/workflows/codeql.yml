name: CodeQL

# CodeQL does not currently analyse PHP, so this workflow scans the parts of
# the repository CodeQL DOES understand:
#   - GitHub Actions workflow files (catches action injection, secret leaks)
#   - any JavaScript/TypeScript that may sneak in alongside views or tooling
# The badge and SARIF integration with GHAS are still useful for a PHP-only
# package, since most supply-chain risks for an OSS library live in CI.

on:
  schedule:
    - cron: "30 5 * * 1"
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze · ${{ matrix.language }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [ 'actions', 'javascript-typescript' ]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
