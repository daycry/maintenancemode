name: Psalm

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  psalm:
    name: Psalm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-php-8.2-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.2-composer-

      - name: Cache Psalm
        uses: actions/cache@v4
        with:
          path: build/psalm
          key: ${{ runner.os }}-psalm-${{ hashFiles('psalm.xml.dist', 'src/**/*.php') }}
          restore-keys: ${{ runner.os }}-psalm-

      - name: Install dependencies
        run: composer install --ansi --no-interaction

      - name: Run Psalm
        run: composer psalm
